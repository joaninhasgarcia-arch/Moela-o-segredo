
<!doctype html>
<html lang="pt-BR" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <script src="/_sdk/element_sdk.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet">
  <style>
    * { font-family: 'Montserrat', sans-serif; }
    html, body { height: 100%; margin: 0; }
    .quiz-wrapper { height: 100%; overflow: auto; }
    .option-btn { transition: all 0.25s ease; }
    .option-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(34,87,40,0.18); }
    .option-btn.selected { transform: translateY(-2px); }
    .progress-fill { transition: width 0.5s cubic-bezier(0.4,0,0.2,1); }
    .fade-in { animation: fadeIn 0.4s ease forwards; }
    @keyframes fadeIn { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }
    .pulse { animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100% { transform:scale(1); } 50% { transform:scale(1.04); } }
    .confetti-piece { position:absolute; width:8px; height:8px; border-radius:2px; animation: confettiFall 2.5s ease forwards; }
    @keyframes confettiFall { 0% { opacity:1; transform:translateY(0) rotate(0deg); } 100% { opacity:0; transform:translateY(300px) rotate(720deg); } }
  </style>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            forest: '#1a5c2a',
            leaf: '#2d8a4e',
            mint: '#e8f5e9',
            sand: '#f5f0e8',
            bark: '#3e2723'
          }
        }
      }
    }
  </script>
  <style>body { box-sizing: border-box; }</style>
  <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
 </head>
 <body class="h-full">
  <div class="quiz-wrapper w-full bg-sand" id="app"><!-- Quiz Container -->
   <div class="max-w-2xl mx-auto px-4 py-8 min-h-full flex flex-col"><!-- Header -->
    <div class="text-center mb-6">
     <div class="inline-flex items-center gap-2 bg-forest rounded-full px-5 py-2 mb-4"><i data-lucide="leaf" style="width:18px;height:18px;color:#a5d6a7;"></i> <span class="text-white text-sm font-semibold tracking-wide" id="quizTitle">Segredo da Moela</span>
     </div>
     <h1 class="text-2xl md:text-3xl font-extrabold text-forest leading-tight" id="quizSubtitle">Descubra Como Ajudar a Superar o Vício</h1>
    </div><!-- Progress Bar -->
    <div id="progressArea" class="mb-8">
     <div class="flex justify-between items-center mb-2"><span class="text-sm font-semibold text-leaf" id="stepLabel">Etapa 1 de 7</span> <span class="text-sm font-semibold text-leaf" id="percentLabel">0%</span>
     </div>
     <div class="w-full h-3 bg-gray-200 rounded-full overflow-hidden">
      <div class="progress-fill h-full bg-gradient-to-r from-leaf to-forest rounded-full" id="progressBar" style="width:0%"></div>
     </div>
    </div><!-- Question Area -->
    <div class="flex-1" id="questionArea"></div><!-- Navigation -->
    <div class="flex items-center justify-between mt-8 pb-4" id="navArea"><button id="backBtn" onclick="goBack()" class="flex items-center gap-2 text-leaf font-semibold opacity-0 pointer-events-none transition-opacity"> <i data-lucide="arrow-left" style="width:18px;height:18px;"></i> Voltar </button> <button id="nextBtn" onclick="goNext()" class="flex items-center gap-2 bg-forest text-white font-bold px-8 py-3 rounded-full opacity-40 pointer-events-none transition-all hover:bg-leaf"> Próxima <i data-luci...
    </div>
   </div>
  </div>
  <script>
const quizData = [
  {
    question: "Quem você deseja ajudar a superar o vício?",
    icon: "heart",
    options: [
      { text: "Marido(a)", icon: "heart" },
      { text: "Filho(a)", icon: "baby" },
      { text: "Pai/Mãe", icon: "users" },
      { text: "Irmão/Irmã", icon: "user-plus" },
      { text: "Amigo(a)", icon: "smile" },
      { text: "Outro", icon: "help-circle" }
    ]
  },
  {
    question: "Você já tentou conversar sobre o vício com essa pessoa?",
    icon: "message-circle",
    options: [
      { text: "A pessoa evitou a conversa", icon: "x-circle" },
      { text: "A pessoa admitiu, mas não quer mudar", icon: "alert-circle" },
      { text: "A pessoa ficou agressiva", icon: "shield-alert" },
      { text: "Já tentamos de tudo, mas nada funcionou", icon: "frown" }
    ]
  },
  {
    question: "Há quanto tempo essa pessoa lida com o vício?",
    icon: "clock",
    options: [
      { text: "Menos de 1 ano", icon: "clock" },
      { text: "1 a 3 anos", icon: "calendar" },
      { text: "3 a 5 anos", icon: "calendar" },
      { text: "Mais de 5 anos", icon: "alert-triangle" }
    ]
  },
  {
    question: "Como o vício afeta a vida da família?",
    icon: "home",
    options: [
      { text: "Brigas constantes", icon: "zap" },
      { text: "Distanciamento emocional", icon: "eye-off" },
      { text: "Problemas financeiros", icon: "trending-down" },
      { text: "Todas as alternativas acima", icon: "alert-octagon" }
    ]
  },
  {
    question: "Você acredita que ainda é possível recuperar essa pessoa?",
    icon: "sun",
    options: [
      { text: "Sim, tenho esperança", icon: "sun" },
      { text: "Tenho dúvidas, mas quero tentar", icon: "cloud" },
      { text: "Já perdi quase toda a esperança", icon: "cloud-rain" },
      { text: "Não sei mais o que fazer", icon: "help-circle" }
    ]
  },
  {
    question: "O que você estaria disposto(a) a fazer para ajudar?",
    icon: "target",
    options: [
      { text: "Seguir um método comprovado", icon: "check-circle" },
      { text: "Investir em um recurso que funcione", icon: "star" },
      { text: "Dedicar tempo e atenção diários", icon: "clock" },
      { text: "Tudo que for necessário", icon: "shield" }
    ]
  },
  {
    question: "Se existisse um método natural, sem efeitos colaterais, você experimentaria?",
    icon: "leaf",
    options: [
      { text: "Com certeza!", icon: "thumbs-up" },
      { text: "Sim, se fosse comprovado", icon: "check" },
      { text: "Talvez, preciso saber mais", icon: "info" },
      { text: "Não tenho certeza", icon: "minus-circle" }
    ]
  }
];

let currentStep = 0;
let answers = {};

function renderQuestion() {
  const q = quizData[currentStep];
  const selected = answers[currentStep];
  const total = quizData.length;
  const pct = Math.round((currentStep / total) * 100);

  document.getElementById('stepLabel').textContent = `Etapa ${currentStep + 1} de ${total}`;
  document.getElementById('percentLabel').textContent = `${pct}%`;
  document.getElementById('progressBar').style.width = `${pct}%`;

  const backBtn = document.getElementById('backBtn');
  backBtn.style.opacity = currentStep > 0 ? '1' : '0';
  backBtn.style.pointerEvents = currentStep > 0 ? 'auto' : 'none';

  const nextBtn = document.getElementById('nextBtn');
  nextBtn.style.opacity = selected !== undefined ? '1' : '0.4';
  nextBtn.style.pointerEvents = selected !== undefined ? 'auto' : 'none';
  nextBtn.textContent = '';
  nextBtn.innerHTML = currentStep === total - 1
    ? 'Ver Resultado <i data-lucide="sparkles" style="width:18px;height:18px;"></i>'
    : 'Próxima <i data-lucide="arrow-right" style="width:18px;height:18px;"></i>';

  const area = document.getElementById('questionArea');
  area.innerHTML = `
    <div class="fade-in">
      <div class="flex items-center gap-3 mb-5">
        <div class="w-12 h-12 rounded-full bg-leaf flex items-center justify-center flex-shrink-0">
          <i data-lucide="${q.icon}" style="width:22px;height:22px;color:white;"></i>
        </div>
        <h2 class="text-xl md:text-2xl font-bold text-forest leading-snug">${q.question}</h2>
      </div>
      <div class="grid gap-3">
        ${q.options.map((o, i) => `
          <button onclick="selectAnswer(${i})" class="option-btn w-full flex items-center gap-4 px-5 py-4 rounded-2xl border-2 text-left font-semibold text-base md:text-lg transition-all ${selected === i ? 'bg-forest text-white border-forest' : 'bg-white text-bark border-gray-200 hover:border-leaf'}">
            <span class="w-9 h-9 rounded-full flex items-center justify-center flex-shrink-0 ${selected === i ? 'bg-white/20' : 'bg-mint'}">
              <i data-lucide="${o.icon}" style="width:18px;height:18px;${selected === i ? 'color:white;' : 'color:#2d8a4e;'}"></i>
            </span>
            <span>${o.text}</span>
          </button>
        `).join('')}
      </div>
    </div>
  `;

  document.getElementById('progressArea').style.display = '';
  document.getElementById('navArea').style.display = '';
  lucide.createIcons();
}

function selectAnswer(idx) {
  answers[currentStep] = idx;
  renderQuestion();
}

function goNext() {
  if (answers[currentStep] === undefined) return;
  if (currentStep < quizData.length - 1) {
    currentStep++;
    renderQuestion();
  } else {
    showResult();
  }
}

function goBack() {
  if (currentStep > 0) {
    currentStep--;
    renderQuestion();
  }
}

function showResult() {
  document.getElementById('progressArea').style.display = 'none';
  document.getElementById('navArea').style.display = 'none';
  document.getElementById('progressBar').style.width = '100%';

  const area = document.getElementById('questionArea');
  area.innerHTML = `
    <div class="fade-in flex flex-col items-center text-center py-8 relative overflow-hidden" id="resultBox">
      <div id="confettiContainer" class="absolute inset-0 pointer-events-none"></div>
      <div class="w-20 h-20 rounded-full bg-forest flex items-center justify-center mb-5">
        <i data-lucide="check-circle" style="width:40px;height:40px;color:white;"></i>
      </div>
      <h2 class="text-3xl md:text-4xl font-extrabold text-forest mb-3">Análise Concluída!</h2>
      <p class="text-bark text-lg mb-2 max-w-md">Com base nas suas respostas, identificamos que existe uma solução natural e comprovada que pode transformar essa situação.</p>
      <p class="text-leaf font-semibold text-base mb-8">Milhares de famílias já encontraram esse caminho.</p>
      <a href="https://pay.cakto.com.br/8e5gvxn_854426" target="_blank" rel="noopener noreferrer" class="pulse inline-flex items-center gap-3 bg-forest text-white font-bold text-lg px-10 py-4 rounded-full hover:bg-leaf transition-colors shadow-lg shadow-forest/30">
        <i data-lucide="lock" style="width:20px;height:20px;"></i>
        Descubra o Segredo Agora
      </a>
      <p class="text-xs text-gray-400 mt-4 flex items-center gap-1"><i data-lucide="shield-check" style="width:14px;height:14px;"></i> Pagamento 100% seguro</p>
    </div>
  `;
  lucide.createIcons();
  spawnConfetti();
}

function spawnConfetti() {
  const container = document.getElementById('confettiContainer');
  if (!container) return;
  const colors = ['#1a5c2a','#2d8a4e','#a5d6a7','#f5f0e8','#66bb6a','#fff'];
  for (let i = 0; i < 40; i++) {
    const el = document.createElement('div');
    el.className = 'confetti-piece';
    el.style.left = Math.random() * 100 + '%';
    el.style.top = -10 + 'px';
    el.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
    el.style.animationDelay = Math.random() * 1.5 + 's';
    el.style.transform = `rotate(${Math.random()*360}deg)`;
    container.appendChild(el);
  }
}

renderQuestion();
</script>
</body>
</html>
