
<!doctype html>
<html lang="pt-BR" class="h-full">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com/3.4.17"></script>
    <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
    <script src="/_sdk/element_sdk.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet">
    <style>
      * { font-family: 'Montserrat', sans-serif; }
      html, body { height: 100%; margin: 0; }
      .quiz-wrapper { height: 100%; overflow: auto; }
      .option-btn { transition: all 0.25s ease; }
      .option-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(34,87,40,0.18); }
      .option-btn.selected { transform: translateY(-2px); }
      .progress-fill { transition: width 0.5s cubic-bezier(0.4,0,0.2,1); }
      .fade-in { animation: fadeIn 0.5s cubic-bezier(0.4,0,0.2,1) forwards; }
      .fade-out { animation: fadeOut 0.4s cubic-bezier(0.4,0,0.2,1) forwards; }
      @keyframes fadeIn { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
      @keyframes fadeOut { from { opacity:1; transform:translateY(0); } to { opacity:0; transform:translateY(-20px); } }
      .pulse { animation: pulse 2s infinite; }
      @keyframes pulse { 0%,100% { transform:scale(1); } 50% { transform:scale(1.04); } }
      .confetti-piece { position:absolute; width:8px; height:8px; border-radius:2px; animation: confettiFall 2.5s ease forwards; }
      @keyframes confettiFall { 0% { opacity:1; transform:translateY(0) rotate(0deg); } 100% { opacity:0; transform:translateY(300px) rotate(720deg); } }
    </style>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              forest: '#1a5c2a',
              leaf: '#2d8a4e',
              mint: '#e8f5e9',
              sand: '#f5f0e8',
              bark: '#3e2723'
            }
          }
        }
      }
    </script>
    <style>body { box-sizing: border-box; }</style>
    <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
  </head>
  <body class="h-full">
    <div class="quiz-wrapper w-full bg-sand" id="app"><!-- Quiz Container -->
      <div class="max-w-2xl mx-auto px-4 py-8 min-h-full flex flex-col"><!-- Header -->
        <div class="text-center mb-6">
          <div class="inline-flex items-center gap-2 bg-forest rounded-full px-5 py-2 mb-4"><i data-lucide="leaf" style="width:18px;height:18px;color:#a5d6a7;"></i> <span class="text-white text-sm font-semibold tracking-wide" id="quizTitle">Segredo da Moela</span>
          </div>
          <h1 class="text-2xl md:text-3xl font-extrabold text-forest leading-tight" id="quizSubtitle">Descubra Como Ajudar a Superar o Vício</h1>
        </div><!-- Progress Bar -->
        <div id="progressArea" class="mb-8">
          <div class="flex justify-between items-center mb-2"><span class="text-sm font-semibold text-leaf" id="stepLabel">Etapa 1 de 7</span> <span class="text-sm font-semibold text-leaf" id="percentLabel">0%</span></div>
          <div class="w-full h-3 bg-gray-200 rounded-full overflow-hidden">
            <div class="progress-fill h-full bg-gradient-to-r from-leaf to-forest rounded-full" id="progressBar" style="width:0%"></div>
          </div>
        </div><!-- Question Area -->
        <div class="flex-1" id="questionArea"></div><!-- Navigation -->
        <div class="flex items-center justify-between mt-8 pb-4" id="navArea">
          <button id="backBtn" onclick="goBack()" class="flex items-center gap-2 text-leaf font-semibold opacity-0 pointer-events-none transition-opacity"> <i data-lucide="arrow-left" style="width:18px;height:18px;"></i> Voltar </button>
        </div>
      </div>
    </div>
    <script>
      const quizData = [ /* Dados do quiz (perguntas e respostas) */ ];

      let currentStep = 0;
      let answers = {};

      function renderQuestion() {
        // Renderização das perguntas e opções
      }

      function selectAnswer(idx) {
        answers[currentStep] = idx;
        const area = document.getElementById('questionArea');
        const buttons = area.querySelectorAll('.option-btn');
        buttons.forEach((btn, i) => {
          if (i === idx) {
            btn.classList.add('selected');
            btn.style.backgroundColor = '#1a5c2a';
            btn.style.color = 'white';
            btn.style.borderColor = '#1a5c2a';
          }
        });
        
        setTimeout(() => {
          if (currentStep < quizData.length - 1) {
            currentStep++;
            renderQuestion();
          } else {
            showResult();
          }
        }, 600);
      }

      function showResult() {
        document.getElementById('progressArea').style.display = 'none';
        document.getElementById('navArea').style.display = 'none';
        document.getElementById('progressBar').style.width = '100%';

        const area = document.getElementById('questionArea');
        area.innerHTML = `
          <div class="fade-in flex flex-col items-center text-center py-8 relative overflow-hidden" id="resultBox">
            <div id="confettiContainer" class="absolute inset-0 pointer-events-none"></div>
            <div class="w-20 h-20 rounded-full bg-forest flex items-center justify-center mb-5">
              <i data-lucide="check-circle" style="width:40px;height:40px;color:white;"></i>
            </div>
            <h2 class="text-3xl md:text-4xl font-extrabold text-forest mb-3">Análise Concluída!</h2>
            <p class="text-bark text-lg mb-2 max-w-md">Com base nas suas respostas, identificamos que existe uma solução natural e comprovada que pode transformar essa situação.</p>
            <p class="text-leaf font-semibold text-base mb-8">Milhares de famílias já encontraram esse caminho.</p>
            <a href="https://pay.cakto.com.br/8e5gvxn_854426" target="_blank" rel="noopener noreferrer" class="pulse inline-flex items-center gap-3 bg-forest text-white font-bold text-lg px-10 py-4 rounded-full hover:bg-leaf transition-colors shadow-lg shadow-forest/30">
              <i data-lucide="lock" style="width:20px;height:20px;"></i>
              Descubra o Segredo Agora
            </a>
            <p class="text-xs text-gray-400 mt-4 flex items-center gap-1"><i data-lucide="shield-check" style="width:14px;height:14px;"></i> Pagamento 100% seguro</p>
          </div>
        `;
        lucide.createIcons();
        spawnConfetti();
      }

      function spawnConfetti() {
        const container = document.getElementById('confettiContainer');
        if (!container) return;
        const colors = ['#1a5c2a','#2d8a4e','#a5d6a7','#f5f0e8','#66bb6a','#fff'];
        for (let i = 0; i < 40; i++) {
          const el = document.createElement('div');
          el.className = 'confetti-piece';
          el.style.left = Math.random() * 100 + '%';
          el.style.top = -10 + 'px';
          el.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
          el.style.animationDelay = Math.random() * 1.5 + 's';
          el.style.transform = `rotate(${Math.random()*360}deg)`;
          container.appendChild(el);
        }
      }
      renderQuestion();
    </script>
  </body>
</html>
