<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Segredo da Moela</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>Segredo da Moela</h1>
    </header>
    <main>
      <div class="progress-bar">
        <div class="progress" id="progress-bar"></div>
      </div>

      <div class="question-container">
        <h2 id="question-title">Como você se sente em relação ao vício dessa pessoa?</h2>
        <div class="answers" id="answer-options">
          <button class="answer-button" onclick="nextQuestion()">Desespero, já tentei de tudo.</button>
          <button class="answer-button" onclick="nextQuestion()">Esperança, quero achar uma solução.</button>
          <button class="answer-button" onclick="nextQuestion()">Raiva, sinto que estou perdendo ela.</button>
          <button class="answer-button" onclick="nextQuestion()">Medo, não sei até onde isso pode ir.</button>
        </div>
      </div>

      <div class="footer">
        <button class="next-button" id="next-button" onclick="nextQuestion()">Próxima Pergunta</button>
        <div class="back-button">
          <button class="back-button">Voltar à pergunta anterior</button>
        </div>
      </div>
    </main>
  </div>

  <div class="checkout-section">
    <p class="checkout-text">Pronto para transformar a vida dessa pessoa?</p>
    <a href="https://pay.cakto.com.br/8e5gvxn_854426" class="checkout-button">Descubra o Segredo Agora</a>
  </div>

  <script src="script.js"></script>
</body>
</html>
