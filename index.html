<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Segredo da Moela - Quiz</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="quiz-container">
        <div id="quiz" class="quiz">
            <!-- Pergunta 1 -->
            <div class="question" id="question1">
                <h2>Como você se sente em relação ao vício dessa pessoa? ❤️</h2>
                <button class="option" onclick="nextQuestion(2)">Desespero, já tentei de tudo.</button>
                <button class="option" onclick="nextQuestion(3)">Esperança, quero achar uma solução.</button>
                <button class="option" onclick="nextQuestion(4)">Raiva, sinto que estou perdendo ela.</button>
                <button class="option" onclick="nextQuestion(5)">Medo, não sei até onde isso pode ir.</button>
            </div>

            <!-- Pergunta 2 -->
            <div class="question" id="question2">
                <h2>Como você reage quando vê essa pessoa bebendo? 🍺</h2>
                <button class="option" onclick="nextQuestion(6)">Sinto um vazio, sem saber o que fazer.</button>
                <button class="option" onclick="nextQuestion(7)">Fico triste, vejo ela se afastando.</button>
                <button class="option" onclick="nextQuestion(8)">Fico com raiva, ela está se destruindo.</button>
                <button class="option" onclick="nextQuestion(9)">Tenho medo, sei que vai piorar.</button>
            </div>

            <!-- Pergunta 3 -->
            <div class="question" id="question3">
                <h2>Você já procurou alternativas para ajudar essa pessoa? 💡</h2>
                <button class="option" onclick="nextQuestion(10)">Já busquei ajuda profissional.</button>
                <button class="option" onclick="nextQuestion(11)">Já tentei tratamentos caseiros.</button>
                <button class="option" onclick="nextQuestion(12)">Não sabia o que fazer até agora.</button>
                <button class="option" onclick="nextQuestion(13)">Não pensei em alternativas, mas agora quero tentar.</button>
            </div>

            <!-- Tostinho com explicação -->
            <div class="explanation" id="explanation" style="display: none;">
                <p>O Segredo da Moela proporciona uma nova esperança para quem quer largar o vício. A solução está ao seu alcance!</p>
                <button class="cta" onclick="window.location.href='https://pay.cakto.com.br/8e5gvxn_854426'">Descubra o Segredo</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
